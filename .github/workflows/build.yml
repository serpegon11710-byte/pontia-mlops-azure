name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env: 
      MLFLOW_TRACKING_URL: ${{ secrets.MLFLOW_TRACKING_URL }}
      EXPERIMENT_NAME: ${{ vars.EXPERIMENT_NAME || 'adult-income-model' }}
      MODEL_NAME: ${{ vars.MODEL_NAME || 'adult-income-model' }}
    steps:
      - name: Generate RUN_NAME
        run: echo "RUN_NAME=run_$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download Adult Income Dataset
        run: |
          mkdir -p data/raw
          curl -o data/raw/adult.data https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data
          curl -o data/raw/adult.test https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.test

      - name: Entrenar y guardar modelo
        run: |
          echo "EXPERIMENT_NAME: -${{ env.EXPERIMENT_NAME }}-"
          python src/main.py #--data_path data/raw/adult.data --model_path models/adult-income-model.pkl --run_name ${{ env.RUN_NAME }} --mlflow_tracking_url ${{ env.MLFLOW_TRACKING_URL }} --experiment_name ${{ env.EXPERIMENT_NAME }} --model_name ${{ env.MODEL_NAME }}
            
      - name: Crear run id en env
        run: echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_ENV

      - name: Run model test
        run: python model_tests/test_model.py #--run_id ${{ env.RUN_ID }} --mlflow_tracking_url ${{ env.MLFLOW_TRACKING_URL }} --model_name ${{ env.MODEL_NAME }}

      - name: Registrar en MLflow 
        run: python scripts/register_model.py #--run_id ${{ env.RUN_ID }} --mlflow_tracking_url ${{ env.MLFLOW_TRACKING_URL }} --model_name ${{ env.MODEL_NAME }}
